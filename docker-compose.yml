x-router-common: &router-common
  build:
    context: images/router/
    dockerfile: ./Dockerfile
  network_mode: none
  cap_add:
    - NET_ADMIN
    - NET_RAW
    - SYS_ADMIN
    - NET_BIND_SERVICE
  sysctls:
    net.ipv4.ip_forward: 1

x-host-dockerfile: &host-dockerfile
  dockerfile_inline: |
    FROM debian:latest

    ARG ADDRESS="10.0.0.2"
    ARG NETMASK="24"
    ARG DEFAULT_GATEWAY="10.0.0.1"

    RUN apt update && apt install -y iproute2 && rm -rf /var/lib/apt/lists/*
    RUN mkdir -p /etc/network/ && touch /etc/network/interfaces
    COPY <<EOF /etc/network/interfaces
    auto eth0
    iface eth0 inet static
    	address $${ADDRESS}
    	netmask $${NETMASK}
    	gateway $${DEFAULT_GATEWAY}
    EOF

    ENTRYPOINT ["sleep", "infinity"]


services:
  frr-router-1:
    container_name: frr-router-1
    <<: *router-common

  frr-router-2:
    container_name: frr-router-2
    <<: *router-common

  host-1:
    container_name: host-1
    build:
      context: .
      args:
        - ADDRESS=10.0.0.2
        - NETMASK=24
        - DEFAULT_GATEWAY=10.0.0.1
      <<: *host-dockerfile
    network_mode: none

  host-2:
    container_name: host-2
    build:
      context: .
      args:
        - ADDRESS=10.0.0.200
        - NETMASK=24
        - DEFAULT_GATEWAY=10.0.0.201
      <<: *host-dockerfile
    network_mode: none